<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar Contraseña | Sistema de Cotizaciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
  <main class="auth-wrapper">
    <div class="auth-box">
      <div class="brand-logo"><i class="bi bi-calculator"></i></div>
      <h1 class="page-title">Recuperar Contraseña</h1>
      <p class="page-subtitle mb-5">Ingresa tu correo electrónico y te enviaremos instrucciones</p>
      <div class="auth-card auth-card-sm mx-auto" style="max-width: 900px;">
        <h2 class="section-title fs-1 mb-2">Restablecer Contraseña</h2>
        <p class="section-subtitle mb-4">Te enviaremos un enlace para crear una nueva contraseña</p>
        <form>
          <div class="mb-4"><label class="form-label">Correo Electrónico</label><input class="form-control" type="email" placeholder="usuario@ejemplo.com"></div>
          <button type="button" class="btn btn-dark w-100 fs-4 d-inline-flex justify-content-center align-items-center gap-3" data-demo-toast="#resetToast">
            <i class="bi bi-envelope"></i> Enviar Instrucciones
          </button>
        </form>
        <div class="auth-links mt-4 fs-3">¿Recordaste tu contraseña? <a href="index.html">Inicia sesión</a></div>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div class="toast" id="resetToast" role="alert">
      <div class="toast-body p-4">
        <div class="d-flex align-items-start gap-3">
          <i class="bi bi-check-circle-fill fs-3"></i>
          <div>
            <div class="fw-bold fs-5">Instrucciones enviadas</div>
            <div class="text-muted">En una implementación real se enviaría el correo de recuperación.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
