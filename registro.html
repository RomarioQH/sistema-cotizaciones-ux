<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro | Sistema de Cotizaciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
  <main class="auth-wrapper">
    <div class="auth-box">
      <div class="brand-logo"><i class="bi bi-calculator"></i></div>
      <h1 class="page-title">Crear Cuenta</h1>
      <p class="page-subtitle mb-5">Regístrate para solicitar cotizaciones</p>
      <div class="auth-card auth-card-sm mx-auto" style="max-width: 900px;">
        <h2 class="section-title fs-1 mb-2">Registro de Cliente</h2>
        <p class="section-subtitle mb-4">Completa tus datos para crear una cuenta</p>
        <form>
          <div class="mb-3"><label class="form-label">Nombre Completo *</label><input class="form-control" placeholder="Juan Pérez"></div>
          <div class="mb-3"><label class="form-label">Correo Electrónico *</label><input class="form-control" placeholder="juan@empresa.com"></div>
          <div class="mb-3"><label class="form-label">Teléfono</label><input class="form-control" placeholder="+1 (555) 123-4567"></div>
          <div class="mb-3"><label class="form-label">Empresa</label><input class="form-control" placeholder="Nombre de tu empresa"></div>
          <div class="mb-3"><label class="form-label">Contraseña *</label><input class="form-control" type="password" placeholder="••••••••"></div>
          <div class="mb-4"><label class="form-label">Confirmar Contraseña *</label><input class="form-control" type="password" placeholder="••••••••"></div>
          <a class="btn btn-dark w-100 fs-4 d-inline-flex justify-content-center align-items-center gap-3" href="pages/cliente/dashboard.html">
            <i class="bi bi-person-plus"></i> Crear Cuenta
          </a>
        </form>
        <div class="auth-links mt-4 fs-3">¿Ya tienes cuenta? <a href="index.html">Inicia sesión aquí</a></div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
